<!DOCTYPE html>
<!--
  Bitcraft City Manager
  Terminal rice UI — tiling WM aesthetic (Ocean Night)
  All element IDs preserved — JS modules wire up unchanged
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcraft City Manager</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div class="wm-root">
  <!-- ═══ TOP BAR ═══ -->
  <header class="bar-top" role="toolbar" aria-label="App bar">
    <div class="bar-top-inner">
      <div class="bar-left">
        <span class="app-title">bcm</span>
        <span class="sep">│</span>
        <section id="claim-input" role="search" aria-label="Load a settlement">
          <div class="claim-input-wrapper">
            <input type="text" id="claim-input-field"
                   placeholder="city name or claim id"
                   autocomplete="off"
                   spellcheck="false"
                   aria-label="Search by city name or enter claim ID"
                   aria-expanded="false"
                   aria-controls="claim-suggestions"
                   aria-autocomplete="list"
                   role="combobox">
            <ul id="claim-suggestions" class="suggestions hidden"
                role="listbox" aria-label="City suggestions"></ul>
          </div>
          <button id="load-btn">Load</button>
        </section>
      </div>
      <div class="bar-right">
        <span id="claim-stats-bar"></span>
      </div>
    </div>
  </header>

  <!-- ═══ ERROR ═══ -->
  <section id="error" class="hidden" role="alert">
    <p id="error-message"></p>
  </section>

  <!-- ═══ CLAIM HEADER ═══ -->
  <section id="claim-header" class="hidden"></section>

  <!-- Legacy element — some JS paths reference this -->
  <section id="claim-info" class="hidden">
    <h2 id="claim-name">-</h2>
  </section>

  <!-- ═══ [ TAB BAR ] ═══
       .hk wraps the hotkey letter for underline hint -->
  <nav id="view-tabs" class="hidden" role="tablist" aria-label="View tabs">
    <button class="tab-btn active" data-view="inventory" role="tab" aria-selected="true"><span class="hk">I</span>nventory</button>
    <button class="tab-btn" data-view="planner" role="tab"><span class="hk">P</span>lanner</button>
    <button class="tab-btn" data-view="citizens" role="tab"><span class="hk">C</span>itizens</button>
    <button class="tab-btn" data-view="ids" role="tab">I<span class="hk">D</span>s</button>
    <button class="tab-btn" data-view="mapLinkComposer" role="tab"><span class="hk">M</span>ap</button>
    <button class="tab-btn" data-view="calculator" role="tab">C<span class="hk">a</span>lc</button>
    <button class="tab-btn" data-view="resourceCalculator" role="tab"><span class="hk">R</span>esources</button>
  </nav>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="wm-main">

    <!-- ── Inventory View ── -->
    <section id="view-inventory" class="view-section" role="tabpanel">
      <div id="dashboard" class="hidden">
        <div id="sub-views">
          <button class="sub-btn active" data-view="overview">overview</button>
          <button class="sub-btn" data-view="farming-view">farming</button>
          <button class="sub-btn" data-view="tailor-view">tailoring</button>
          <button class="sub-btn" data-view="woodworking-view">woodworking</button>
          <button class="sub-btn" data-view="leatherworking-view">leatherworking</button>
          <button class="sub-btn" data-view="masonry-view">masonry</button>
          <button class="sub-btn" data-view="smithing-view">smithing</button>
          <button class="sub-btn" data-view="fishing-view">fishing</button>
          <button class="sub-btn" data-view="scholar-view">scholar</button>
          <button class="sub-btn" data-view="cooking-view">cooking</button>
        </div>
        <div id="overview" class="dash-view">
          <div id="quick-stats">
            <div id="food-stats"></div>
            <div id="supply-stats"></div>
          </div>
          <div id="crafting-stations"></div>
          <div id="inventory">
            <div id="inventory-grid"></div>
          </div>
        </div>
        <div id ="farming-view" class="dash-view hidden">
          <div id="farming-view-inventory"></div>
          <div id="farming-view-package"></div>
        </div>
        <div id ="tailor-view" class="dash-view hidden">
          <div id="tailor-view-inventory"></div>
          <div id="tailor-view-package"></div>
        </div>
        <div id ="woodworking-view" class="dash-view hidden">
          <div id="woodworking-view-inventory"></div>
          <div id="woodworking-view-package"></div>
        </div>
        <div id="leatherworking-view" class="dash-view hidden">
          <div id="leatherworking-view-inventory"></div>
          <div id="leatherworking-view-package"></div>
        </div>
        <div id="mining-view" class="dash-view hidden">
          <div id="mining-view-inventory"></div>
          <div id="mining-view-package"></div>
        </div>
        <div id="masonry-view" class="dash-view hidden">
          <div id="masonry-view-inventory"></div>
          <div id="masonry-view-package"></div>
        </div>
        <div id="smithing-view" class="dash-view hidden">
          <div id="smithing-view-inventory"></div>
          <div id="smithing-view-package"></div>
        </div>
        <div id="fishing-view" class="dash-view hidden">
          <div id="fishing-view-inventory"></div>
          <div id="fishing-view-package"></div>
        </div>
        <div id="scholar-view" class="dash-view hidden">
          <div id="scholar-view-inventory"></div>
          <div id="scholar-view-package"></div>
        </div>
        <div id="cooking-view" class="dash-view hidden">
          <div id="cooking-view-inventory"></div>
          <div id="cooking-view-package"></div>
        </div>
      </div>
    </section>

    <!-- ── Planner View ── -->
    <section id="view-planner" class="view-section hidden" role="tabpanel">
      <div id="planner-content" aria-live="polite"></div>
    </section>

    <!-- ── Citizens View ── -->
    <section id="view-citizens" class="view-section hidden" role="tabpanel">
      <div id="citizens-grid" aria-live="polite"></div>
    </section>

    <!-- ── ID Lookup View ── -->
    <section id="view-ids" class="view-section hidden" role="tabpanel">
      <div id="ids-search">
        <input type="text" id="ids-filter" class="term-input"
               placeholder="Filter by name..." aria-label="Filter IDs">
      </div>
      <div id="ids-tabs">
        <button class="ids-tab-btn active" data-type="citizens">Citizens</button>
        <button class="ids-tab-btn" data-type="items">Items</button>
      </div>
      <div id="ids-list"></div>
    </section>

    <!-- ── Map Link Composer View ── -->
    <section id="view-mapLinkComposer" class="view-section hidden" role="tabpanel">
      <div id="mlc-container">
        <div id="checkbox-row"></div>
        <div id="mlc-res-input">
          <label for="res-ids">Resource IDs</label>
          <input id="res-ids" type="text" placeholder="1234,567,12">
        </div>
        <div id="mlc-player-input">
          <label for="player-ids">Player IDs</label>
          <input id="player-ids" type="text" placeholder="5020000,5497816">
        </div>
        <div id="mlc-enemy-input">
          <label for="enemy-ids">Enemy/Animal IDs</label>
          <input id="enemy-ids" type="text" placeholder="2,5,7">
        </div>
        <button id="lnk-gen-btn">Generate Link</button>
        <div class="map-link-output">
          <label>Map-Link:</label>
          <a id="map-link" href="#" target="_blank" rel="noopener noreferrer">-</a>
        </div>
        <button id="id-matrix-btn">Show ID Selection Matrix</button>
        <div id="id-matrix" class="hidden">
          <div id="res-id-matrix"></div>
          <div id="enemy-id-matrix"></div>
        </div>
      </div>
    </section>

    <!-- ── Calculator View ── -->
    <section id="view-calculator" class="view-section hidden" role="tabpanel">
      <div id="calculator-content" aria-live="polite"></div>
    </section>

    <section id="view-resourceCalculator" class="view-section hidden" role="tabpanel">
      <div id="resource-calculator-content" aria-live="polite"></div>
    </section>
  </main>

  <!-- ═══ BOTTOM BAR ═══ -->
  <footer class="bar-bottom" role="status" aria-label="Status bar" aria-live="polite">
    <div class="bar-bottom-inner">
      <span id="status-view" class="status-mode">INVENTORY</span>
      <div class="status-seg">
        <span id="status-claim">no claim loaded</span>
      </div>
      <span class="status-spacer"></span>
      <div class="status-seg status-keyhint">
        <kbd>?</kbd> keys
      </div>
      <div class="status-seg">
        <span id="version-text">v3.0.0</span>
      </div>
    </div>
  </footer>
</div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
